name: Generate & Deploy Article

on:
  schedule:
    - cron: '0 6 * * 1'  # Every Monday at 06:00 UTC (08:00 Wien)
  workflow_dispatch:       # Manual trigger

permissions:
  contents: write

jobs:
  generate-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Gemini SDK
        run: npm install @google/generative-ai

      - name: Generate article
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: node scripts/generate-article.js

      - name: Build Astro site
        run: npm run build

      - name: Commit generated article
        run: |
          git config user.name "Article Bot"
          git config user.email "bot@produktfotostudio.at"
          git add -A
          git diff --staged --quiet || git commit -m "📝 Auto-generated article $(date +%Y-%m-%d)"
          git push

      - name: Deploy via FTP
        run: |
          sudo apt-get install -y lftp
          lftp -u "${{ secrets.FTP_USERNAME }}","${{ secrets.FTP_PASSWORD }}" \
            -e "set ftp:ssl-force false; set ftp:ssl-protect-data false; set net:max-retries 3; set net:reconnect-interval-base 5; mirror -R --delete --verbose --no-perms dist/ produktfotostudio.at/web/; quit" \
            ftp://${{ secrets.FTP_SERVER }}
