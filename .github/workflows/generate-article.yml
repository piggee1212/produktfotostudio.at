name: Generate & Deploy Article

on:
  schedule:
    - cron: '0 6 * * 1'  # Every Monday at 06:00 UTC (08:00 Wien)
  workflow_dispatch:       # Manual trigger

permissions:
  contents: write

jobs:
  generate-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Gemini SDK
        run: npm install @google/generative-ai

      - name: Generate article
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: node scripts/generate-article.js

      - name: Build Astro site
        run: npm run build

      - name: Commit generated article
        run: |
          git config user.name "Article Bot"
          git config user.email "bot@produktfotostudio.at"
          git add -A
          git diff --staged --quiet || git commit -m "📝 Auto-generated article $(date +%Y-%m-%d)"
          git push

      - name: Deploy via FTP
        env:
          FTP_USER: ${{ secrets.FTP_USERNAME }}
          FTP_PASS: ${{ secrets.FTP_PASSWORD }}
          FTP_HOST: ${{ secrets.FTP_SERVER }}
        run: |
          sudo apt-get install -y lftp
          lftp -u "$FTP_USER","$FTP_PASS" "ftp://$FTP_HOST" -e "
            set ftp:ssl-allow false;
            set ftp:passive-mode true;
            set net:max-retries 5;
            set net:reconnect-interval-base 10;
            set net:timeout 30;
            debug 3;
            mirror -R --delete --verbose --no-perms dist/ produktfotostudio.at/web/;
            quit"

