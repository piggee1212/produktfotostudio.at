name: Generate & Deploy Article

on:
  schedule:
    - cron: '0 6 * * 1'  # Every Monday at 06:00 UTC (08:00 Wien)
  workflow_dispatch:       # Manual trigger

permissions:
  contents: write

jobs:
  generate-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Gemini SDK
        run: npm install @google/generative-ai

      - name: Generate article
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: node scripts/generate-article.js

      - name: Build Astro site
        run: npm run build

      - name: Commit generated article
        run: |
          git config user.name "Article Bot"
          git config user.email "bot@produktfotostudio.at"
          git add -A
          git diff --staged --quiet || git commit -m "📝 Auto-generated article $(date +%Y-%m-%d)"
          git push

      - name: Deploy via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.0
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          port: 21
          protocol: ftps
          local-dir: ./dist/
          server-dir: produktfotostudio.at/web/
          dangerous-clean-slate: false
